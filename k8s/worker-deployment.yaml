apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-worker
  labels:
    app: ping-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ping-worker
  template:
    metadata:
      labels:
        app: ping-worker
    spec:
      containers:
        - name: ping-worker
          image: upsent-ping-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: upsent-secrets
                  key: MONGODB_URI
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: upsent-secrets
                  key: REDIS_URL
            - name: WORKER_CONCURRENCY
              valueFrom:
                configMapKeyRef:
                  name: upsent-config
                  key: WORKER_CONCURRENCY
            - name: PING_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: upsent-config
                  key: PING_TIMEOUT
            - name: PING_REGION
              valueFrom:
                configMapKeyRef:
                  name: upsent-config
                  key: PING_REGION
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
